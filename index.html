<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WASTEXZ — New Era</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
background:#0a0a0f;
color:white;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}

.bg-glow{
position:absolute;
width:600px;
height:600px;
background:radial-gradient(circle,#7f00ff,transparent 60%);
filter:blur(120px);
animation:move 8s infinite alternate ease-in-out;
}

@keyframes move{
0%{transform:translate(-100px,-100px);}
100%{transform:translate(100px,100px);}
}

.card{
position:relative;
z-index:2;
text-align:center;
}

h1{
font-family:'Orbitron',sans-serif;
font-size:60px;
background:linear-gradient(90deg,#00f5ff,#ff00c8);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
margin-bottom:20px;
}

p{
opacity:0.7;
margin-bottom:40px;
}

button{
padding:15px 40px;
border:none;
background:linear-gradient(90deg,#00f5ff,#ff00c8);
color:black;
font-weight:600;
cursor:pointer;
border-radius:30px;
transition:0.3s;
}

button:hover{
transform:scale(1.1);
box-shadow:0 0 25px #ff00c8;
}
</style>
</head>

<body>

<div class="bg-glow"></div>

<div class="card">
<h1>WASTEXZ</h1>
<p>Future belongs to builders.</p>
<button onclick="alert('New Money Mindset 💎')">ENTER THE FUTURE</button>
</div>

</body>
</html>
