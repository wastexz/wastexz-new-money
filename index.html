<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WASTEXZ</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: #0f0f10;
    color: #e8e8e8;
    font-family: 'Inter', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    text-align: center;
}

.container {
    max-width: 700px;
}

h1 {
    font-family: 'Playfair Display', serif;
    font-size: 64px;
    letter-spacing: 4px;
    margin-bottom: 20px;
}

p {
    font-size: 18px;
    color: #b9a26b;
    margin-bottom: 40px;
}

.button {
    display: inline-block;
    padding: 12px 40px;
    border: 1px solid #b9a26b;
    color: #b9a26b;
    text-decoration: none;
    font-size: 14px;
    letter-spacing: 2px;
    transition: 0.3s;
}

.button:hover {
    background: #b9a26b;
    color: #0f0f10;
}

</head>

<body>

<div class="container">
    <h1>WASTEXZ</h1>
