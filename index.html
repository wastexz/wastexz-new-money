<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WASTEXZ</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: #0c0d10;
    color: #e5e5e5;
    font-family: 'Inter', sans-serif;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
}

.container {
    text-align: center;
    max-width: 700px;
}

h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 70px;
    letter-spacing: 6px;
    margin-bottom: 30px;
}

.tagline {
    font-size: 16px;
    letter-spacing: 4px;
    color: #9c9c9c;
    margin-bottom: 50px;
}

.line {
    width: 120px;
    height: 1px;
    background: #444;
    margin: 0 auto 40px auto;
}

.button {
    padding: 10px 36px;
    border: 1px solid #555;
    color: #e5e5e5;
    text-decoration: none;
    font-size: 13px;
    letter-spacing: 3px;
    transition: 0.3s;
}

.button:hover {
    background: #e5e5e5;
    color: #0c0d10;
}
</style>
</head>

<body>

<div class="container">
    <h1>WASTEXZ</h1>
    <div class="line"></div>
    <div class="tagline">Discipline. Taste. Precision.</div>
    <a href="#" class="button">ENTER</a>
</div>

</body>
</html>
